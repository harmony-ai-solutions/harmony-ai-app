name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the build'
        default: 'v0.0.0-dev'
      skip_build:
        description: 'Run tests only, skip APK/IPA builds (dry-run)'
        type: boolean
        default: false

jobs:
  # ───────────────────────────────────────────────────────────────────
  # NEW: Schema parity gate — checks RN schema matches Go schema
  # ───────────────────────────────────────────────────────────────────
  schema-parity:
    name: Schema parity (RN ↔ Harmony Link)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: harmony-ai-solutions/harmony-link-private
          token: ${{ secrets.HARMONY_LINK_REPO_PAT }}
          path: harmony-link
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: npm ci
      - name: Install Go dependencies
        working-directory: harmony-link
        run: go mod download
      - name: Dump RN schema
        run: npm run schema:dump -- --output rn-schema.current.json
      - name: Dump Go schema
        working-directory: harmony-link
        run: go run . dump-schema | tail -n +4 > ../go-schema.current.json
      - name: Compare schemas
        run: python3 scripts/compare-schemas.py rn-schema.current.json go-schema.current.json
      - name: Upload schemas on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-diff
          path: |
            rn-schema.current.json
            go-schema.current.json

  # ───────────────────────────────────────────────────────────────────
  # NEW: Test gate — must pass before any artifact is built
  # ───────────────────────────────────────────────────────────────────
  test:
    name: Tests (pre-release gate)
    needs: schema-parity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx jest --selectProjects unit --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: unit-tests.xml

      - name: Integration tests
        run: npx jest --selectProjects integration --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: integration-tests.xml

      - name: Migration tests
        run: npx jest --selectProjects unit --testPathPatterns migrations

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-release-test-results
          path: reports/

  # ───────────────────────────────────────────────────────────────────
  # NOTE: Pre-release E2E gate is intentionally NOT wired here yet.
  # To add it: insert an `e2e-android-prerelease` job between `test`
  # and `build-android`, with `needs: test` and add it to
  # `build-android`'s needs: [test, e2e-android-prerelease].
  # Recommended: wait until nightly E2E runs are stable for ~2 weeks,
  # then add the gate. See Phase 7-3 step 5 in the plan docs.
  # ───────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # Job 1: Build Android APK (matrix: dev, prod)
  # ──────────────────────────────────────────────
  build-android:
    name: Build Android APK (${{ matrix.environment }})
    needs: test
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Set VERSION variable
        run: |
          INPUTS_VERSION='${{ github.event.inputs.version }}'
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${INPUTS_VERSION}" ]]; then
            VERSION="${INPUTS_VERSION}"
          else
            VERSION="v0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build ${{ matrix.environment }} release APK
        working-directory: android
        run: |
          # Update versionName in build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION}\"/" app/build.gradle
          chmod +x gradlew
          ./gradlew assemble${{ matrix.environment == 'dev' && 'Dev' || 'Prod' }}Release \
            -PRELEASE_KEYSTORE_FILE=release.keystore \
            -PRELEASE_KEYSTORE_PASSWORD="${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}" \
            -PGOOGLE_WEB_CLIENT_ID="${{ vars.GOOGLE_WEB_CLIENT_ID }}" \
            -PAPPLE_SERVICES_ID="${{ vars.APPLE_SERVICES_ID }}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_UPLOAD_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_S3_UPLOAD_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Upload APK to S3 (versioned)
        run: |
          APK_PATH="android/app/build/outputs/apk/${{ matrix.environment }}/release/app-${{ matrix.environment }}-release.apk"
          S3_VERSIONED="s3://soulbits-releases/app/${VERSION}/${{ matrix.environment }}/harmony-ai-app-${VERSION}-android.apk"
          echo "Uploading ${APK_PATH} to ${S3_VERSIONED}"
          aws s3 cp "${APK_PATH}" "${S3_VERSIONED}"

      - name: Update latest APK pointer
        run: |
          APK_PATH="android/app/build/outputs/apk/${{ matrix.environment }}/release/app-${{ matrix.environment }}-release.apk"
          S3_LATEST="s3://soulbits-releases/app/latest/${{ matrix.environment }}/harmony-ai-app-android.apk"
          echo "Updating latest pointer: ${S3_LATEST}"
          aws s3 cp "${APK_PATH}" "${S3_LATEST}"

      - name: Print download URLs
        run: |
          echo "✅ APK uploaded successfully!"
          echo "📥 Versioned: https://download.soulbits.app/app/${VERSION}/${{ matrix.environment }}/harmony-ai-app-${VERSION}-android.apk"
          echo "📥 Latest:    https://download.soulbits.app/app/latest/${{ matrix.environment }}/harmony-ai-app-android.apk"

  # ──────────────────────────────────────────────
  # Job 2: Build iOS IPA (matrix: dev, prod, unsigned for sideloading)
  # ──────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA (${{ matrix.environment }})
    needs: test
    if: ${{ !inputs.skip_build }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Set VERSION variable
        run: |
          INPUTS_VERSION='${{ github.event.inputs.version }}'
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' && -n "${INPUTS_VERSION}" ]]; then
            VERSION="${INPUTS_VERSION}"
          else
            VERSION="v0.0.0-dev"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Generate .env for ${{ matrix.environment }}
        run: |
          printf 'IS_BETA=%s\nGOOGLE_WEB_CLIENT_ID=%s\nAPPLE_SERVICES_ID=%s\n' \
            "${{ matrix.environment == 'dev' && 'true' || 'false' }}" \
            "${{ vars.GOOGLE_WEB_CLIENT_ID }}" \
            "${{ vars.APPLE_SERVICES_ID }}" > .env
          echo "::notice::Generated .env for ${{ matrix.environment }} (IS_BETA=${{ matrix.environment == 'dev' && 'true' || 'false' }})"

      - name: Build ${{ matrix.environment }} iOS app
        working-directory: ios
        run: |
          xcodebuild \
            -workspace HarmonyAIChat.xcworkspace \
            -scheme HarmonyAIChat \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath build \
            clean archive \
            -archivePath build/HarmonyAIChat.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER=ai.soulbits.chat${{ matrix.environment == 'dev' && '.dev' || '' }}

      - name: Package ${{ matrix.environment }} IPA
        run: |
          chmod +x scripts/package-ios-ipa.sh
          IPA_OUTPUT="${PWD}/harmony-ai-app-${VERSION}-ios.ipa"
          ./scripts/package-ios-ipa.sh \
            ios/build/HarmonyAIChat.xcarchive/Products/Applications/HarmonyAIChat.app \
            "${IPA_OUTPUT}"
          ls -la "${IPA_OUTPUT}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_UPLOAD_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_S3_UPLOAD_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Upload IPA to S3 (versioned)
        run: |
          S3_VERSIONED="s3://soulbits-releases/app/${VERSION}/${{ matrix.environment }}/harmony-ai-app-${VERSION}-ios.ipa"
          echo "Uploading IPA to ${S3_VERSIONED}"
          aws s3 cp "harmony-ai-app-${VERSION}-ios.ipa" "${S3_VERSIONED}"

      - name: Update latest IPA pointer
        run: |
          S3_LATEST="s3://soulbits-releases/app/latest/${{ matrix.environment }}/harmony-ai-app-ios.ipa"
          echo "Updating latest pointer: ${S3_LATEST}"
          aws s3 cp "harmony-ai-app-${VERSION}-ios.ipa" "${S3_LATEST}"

      - name: Print download URLs
        run: |
          echo "✅ IPA uploaded successfully!"
          echo "📥 Versioned: https://download.soulbits.app/app/${VERSION}/${{ matrix.environment }}/harmony-ai-app-${VERSION}-ios.ipa"
          echo "📥 Latest:    https://download.soulbits.app/app/latest/${{ matrix.environment }}/harmony-ai-app-ios.ipa"

  # ──────────────────────────────────────────────
  # Job 3: Create GitHub Release with download links
  # ──────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Harmony AI App ${{ github.ref_name }}
          body: |
            ## Downloads

            | Environment | Platform | Download |
            |-------------|----------|----------|
            | dev | Android | [APK](https://download.soulbits.app/app/${{ github.ref_name }}/dev/harmony-ai-app-${{ github.ref_name }}-android.apk) |
            | dev | iOS | [IPA](https://download.soulbits.app/app/${{ github.ref_name }}/dev/harmony-ai-app-${{ github.ref_name }}-ios.ipa) |
            | prod | Android | [APK](https://download.soulbits.app/app/${{ github.ref_name }}/prod/harmony-ai-app-${{ github.ref_name }}-android.apk) |
            | prod | iOS | [IPA](https://download.soulbits.app/app/${{ github.ref_name }}/prod/harmony-ai-app-${{ github.ref_name }}-ios.ipa) |

            **Latest builds** (always up-to-date):
            - **dev**: [Android APK](https://download.soulbits.app/app/latest/dev/harmony-ai-app-android.apk) · [iOS IPA](https://download.soulbits.app/app/latest/dev/harmony-ai-app-ios.ipa)
            - **prod**: [Android APK](https://download.soulbits.app/app/latest/prod/harmony-ai-app-android.apk) · [iOS IPA](https://download.soulbits.app/app/latest/prod/harmony-ai-app-ios.ipa)

            See [INSTALLATION.md](https://github.com/harmony-ai-solutions/harmony-ai-app/blob/main/docs/INSTALLATION.md) for installation instructions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
